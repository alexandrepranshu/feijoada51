<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feijoada 51 · Painel do Anfitrião</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDLqVvrKCZ_mb078tFW08bgvfXBvrMTNsM",
    authDomain: "feijoada-51.firebaseapp.com",
    databaseURL: "https://feijoada-51-default-rtdb.firebaseio.com",
    projectId: "feijoada-51",
    storageBucket: "feijoada-51.firebasestorage.app",
    messagingSenderId: "844741581558",
    appId: "1:844741581558:web:a1a87b4ce9958598b92ad7"
  };

  // ▼ EDITE AQUI as informações da festa e o URL do GitHub Pages
  window.FESTA = {
    nome: "Alexandre",
    data: "13 de junho de 2026",
    horario: "12h",
    local: "Brasília, DF",
    endereco: "Coloque o endereço completo aqui",
    capacidade: 50,
    urlBase: "https://SEU_USUARIO.github.io/feijoada51"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._db = db; window._ref = ref; window._set = set;
  window._onValue = onValue; window._remove = remove; window._update = update;

  onValue(ref(db,'convidados'), snap => {
    window._guests = snap.val() || {};
    renderAll();
    const el = document.getElementById('fb-status');
    el.className = 'firebase-status status-ok';
    el.textContent = '● Firebase conectado';
  }, () => {
    const el = document.getElementById('fb-status');
    el.className = 'firebase-status status-err';
    el.textContent = '⚠ Erro de conexão';
  });
</script>

<style>
:root {
  --bg:#faf8f4; --surface:#fff; --surface2:#f3efe8;
  --text:#2a1f0e; --text2:#6b5c44; --text3:#9e8e78;
  --border:rgba(139,105,60,0.15); --border2:rgba(139,105,60,0.3);
  --amber:#c67c2a; --amber-light:#fdf0de; --amber-mid:#e8a04a;
  --green:#3a6b3a; --green-light:#eaf3e6;
  --red:#a03030; --red-light:#fdeaea;
  --blue:#2a5070; --blue-light:#e8f0f7;
  --gray:#7a7068; --gray-light:#f0ece6;
  --r:10px; --rlg:16px;
  --sh:0 2px 12px rgba(60,30,0,0.08); --shlg:0 8px 32px rgba(60,30,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

.header{background:var(--text);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.hbrand{display:flex;align-items:center;gap:16px;}
.hicon{width:48px;height:48px;border-radius:12px;background:var(--amber);display:flex;align-items:center;justify-content:center;font-size:22px;}
.htitle{font-family:'Playfair Display',serif;font-size:22px;color:#f5ede0;font-weight:600;}
.hsub{font-size:13px;color:#9e8070;margin-top:2px;}
.firebase-status{font-size:12px;padding:5px 12px;border-radius:99px;font-family:'DM Mono',monospace;}
.status-ok{background:var(--green-light);color:var(--green);}
.status-err{background:var(--red-light);color:var(--red);}
.status-wait{background:var(--gray-light);color:var(--gray);}

.main{max-width:1100px;margin:0 auto;padding:28px 24px;}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
.stat{background:var(--surface);border-radius:var(--rlg);padding:16px 18px;border:1px solid var(--border);box-shadow:var(--sh);}
.stat-val{font-size:28px;font-weight:600;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;}
.sa .stat-val{color:var(--amber);} .sg .stat-val{color:var(--green);} .sr .stat-val{color:var(--red);} .sgr .stat-val{color:var(--gray);}

.capbox{background:var(--surface);border-radius:var(--rlg);padding:16px 20px;border:1px solid var(--border);margin-bottom:28px;box-shadow:var(--sh);}
.caphdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
.captit{font-size:13px;font-weight:500;color:var(--text2);}
.cappct{font-size:13px;font-family:'DM Mono',monospace;color:var(--amber);}
.bartrack{height:8px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.barfill{height:100%;background:linear-gradient(90deg,var(--amber-mid),var(--amber));border-radius:99px;transition:width 0.6s ease;}

.stit{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
.addcard{background:var(--surface);border-radius:var(--rlg);padding:20px;border:1px solid var(--border);box-shadow:var(--sh);margin-bottom:28px;}
.fgrid{display:grid;grid-template-columns:2fr 1.5fr 1fr auto;gap:10px;align-items:end;}
@media(max-width:680px){.fgrid{grid-template-columns:1fr;}}
.field label{display:block;font-size:12px;color:var(--text3);margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:14px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:border-color .2s,box-shadow .2s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(198,124,42,.12);}
.btnp{padding:11px 22px;background:var(--amber);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'DM Sans',sans-serif;}
.btnp:hover{background:#a86520;transform:translateY(-1px);box-shadow:var(--sh);}
.btnp:active{transform:scale(.98);}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fb{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.fb:hover{border-color:var(--amber);color:var(--amber);}
.fb.active{background:var(--amber);color:#fff;border-color:transparent;}

.glist{display:flex;flex-direction:column;gap:8px;}
.gc{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:border-color .2s,box-shadow .2s;box-shadow:var(--sh);}
.gc:hover{border-color:var(--border2);box-shadow:var(--shlg);}
.gc.confirmed{border-left:3px solid var(--green);}
.gc.invited{border-left:3px solid var(--amber);}
.gc.savedate{border-left:3px solid #7a9eb5;}
.gc.declined{border-left:3px solid var(--red);opacity:.6;}
.gc.waiting{border-left:3px solid var(--gray);}

.av{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
.gi{flex:1;min-width:0;}
.gn{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gm{font-size:12px;color:var(--text3);display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;}
.gr{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}

.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500;white-space:nowrap;}
.bp{background:var(--gray-light);color:var(--gray);}
.bs{background:var(--blue-light);color:var(--blue);}
.bi{background:var(--amber-light);color:#7a4a10;}
.bc{background:var(--green-light);color:var(--green);}
.bd{background:var(--red-light);color:var(--red);}
.bw{background:var(--gray-light);color:var(--gray);}

.bsm{padding:5px 10px;border-radius:8px;font-size:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.bsm:hover{background:var(--surface2);}
.bsm.msg:hover{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.bsm.ok:hover{background:var(--green-light);border-color:var(--green);color:var(--green);}
.bsm.no:hover{background:var(--red-light);border-color:var(--red);color:var(--red);}

.bdel{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;transition:all .15s;}
.bdel:hover{background:var(--red-light);color:var(--red);border-color:var(--red);}

.plusb{background:var(--green-light);color:var(--green);font-size:11px;padding:2px 7px;border-radius:99px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.newb{animation:pulse 1.5s ease-in-out 4;background:#e8f7ee;color:var(--green);font-size:10px;padding:2px 7px;border-radius:99px;}

.mov{position:fixed;inset:0;background:rgba(20,10,0,.55);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
.mov.open{display:flex;}
.mo{background:var(--surface);border-radius:var(--rlg);padding:28px;width:100%;max-width:520px;box-shadow:var(--shlg);border:1px solid var(--border);}
.mohdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.motit{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
.mox{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--text3);}
.mox:hover{background:var(--surface2);}

.mtabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.mt{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.mt.active{background:var(--text);color:#f5ede0;border-color:transparent;}

.mo textarea{width:100%;min-height:160px;padding:14px;border:1.5px solid var(--border2);border-radius:var(--r);font-size:13px;font-family:'DM Sans',sans-serif;line-height:1.6;resize:vertical;background:var(--bg);color:var(--text);transition:border-color .2s;}
.mo textarea:focus{outline:none;border-color:var(--amber);}

.lbox{margin-top:12px;padding:10px 14px;background:var(--surface2);border-radius:var(--r);border:1px solid var(--border);display:flex;gap:8px;align-items:center;}
.lurl{font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);flex:1;word-break:break-all;}
.bcpl{padding:5px 12px;font-size:12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;}

.mact{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;}
.bwpp{padding:10px 20px;background:#25D366;color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bwpp:hover{background:#1ebe5c;}
.bcop{padding:10px 16px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.bcan{padding:10px 14px;background:transparent;border:none;font-size:14px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;}

.empty{text-align:center;padding:40px;color:var(--text3);font-size:14px;}
.toast{position:fixed;bottom:24px;right:24px;z-index:200;background:var(--text);color:#f5ede0;padding:12px 20px;border-radius:var(--r);font-size:14px;box-shadow:var(--shlg);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<div class="header">
  <div class="hbrand">
    <div class="hicon">🍲</div>
    <div>
      <div class="htitle">Feijoada de 51 Anos</div>
      <div class="hsub">Painel do Anfitrião · Alexandre</div>
    </div>
  </div>
  <div id="fb-status" class="firebase-status status-wait">⏳ Conectando…</div>
</div>

<div class="main">
  <div class="stats" id="stats"></div>
  <div class="capbox">
    <div class="caphdr">
      <span class="captit">Ocupação da festa</span>
      <span class="cappct" id="cappct">0 / 50 confirmados</span>
    </div>
    <div class="bartrack"><div class="barfill" id="barfill" style="width:0%"></div></div>
  </div>

  <div class="stit">Adicionar convidado</div>
  <div class="addcard">
    <div class="fgrid">
      <div class="field"><label>Nome completo</label><input type="text" id="iname" placeholder="Ex: Maria Silva" /></div>
      <div class="field"><label>WhatsApp (DDD + número)</label><input type="text" id="iphone" placeholder="61999990000" /></div>
      <div class="field"><label>Grupo</label>
        <select id="igroup">
          <option value="família">Família</option>
          <option value="amigos">Amigos</option>
          <option value="trabalho">Trabalho</option>
          <option value="outros">Outros</option>
        </select>
      </div>
      <button class="btnp" onclick="addGuest()">+ Adicionar</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="glist" id="glist"></div>
</div>

<!-- MODAL -->
<div class="mov" id="modal">
  <div class="mo">
    <div class="mohdr">
      <div class="motit" id="moname">Mensagem</div>
      <button class="mox" onclick="closeModal()">✕</button>
    </div>
    <div class="mtabs">
      <button class="mt active" onclick="switchTab('savedate',this)">📅 Save the Date</button>
      <button class="mt" onclick="switchTab('invite',this)">🎉 Convite</button>
      <button class="mt" onclick="switchTab('reminder',this)">🔔 Lembrete</button>
    </div>
    <textarea id="momsg"></textarea>
    <div class="lbox">
      <span class="lurl" id="molink"></span>
      <button class="bcpl" onclick="copyLink()">Copiar link</button>
    </div>
    <div class="mact">
      <button class="bcan" onclick="closeModal()">Fechar</button>
      <button class="bcop" onclick="copyMsg()">📋 Copiar texto</button>
      <button class="bwpp" onclick="sendWpp()">💬 Abrir WhatsApp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window._guests={};
let activeFilter='todos', modalId=null, curTab='savedate';

const PAL=[
  {bg:'#fdeecf',c:'#7a4a10'},{bg:'#e8f3ea',c:'#2a5a2a'},{bg:'#fce8e8',c:'#7a2a2a'},
  {bg:'#e8edf8',c:'#2a3a6a'},{bg:'#f3e8f8',c:'#5a2a7a'},{bg:'#e8f8f5',c:'#1a5a50'},
  {bg:'#f8f0e8',c:'#6a3a1a'},{bg:'#f0f8e8',c:'#3a5a1a'}
];
const SLABEL={pendente:'Pendente',savedate:'Save the Date',invited:'Convidado',confirmed:'Confirmado ✓',declined:'Recusou',waiting:'Lista de espera'};
const SBADGE={pendente:'bp',savedate:'bs',invited:'bi',confirmed:'bc',declined:'bd',waiting:'bw'};
const SCARD={pendente:'',savedate:'savedate',invited:'invited',confirmed:'confirmed',declined:'declined',waiting:'waiting'};
const SORD={confirmed:0,invited:1,savedate:2,pendente:3,waiting:4,declined:5};

const ini=n=>{const p=n.trim().split(' ').filter(Boolean);return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():n.slice(0,2).toUpperCase();};
const pal=n=>{let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))&0xff;return PAL[h%PAL.length];};
const fmt=p=>(!p||p.length<10)?p:'('+p.slice(0,2)+') '+p.slice(2,7)+'-'+p.slice(7);
const fbOk=()=>typeof window._db!=='undefined';

function saveG(id,d){if(!fbOk()){toast('Configure o Firebase');return;}window._set(window._ref(window._db,'convidados/'+id),d);}
function upG(id,d){if(fbOk())window._update(window._ref(window._db,'convidados/'+id),d);}
function delG(id){if(fbOk())window._remove(window._ref(window._db,'convidados/'+id));}

function addGuest(){
  const name=document.getElementById('iname').value.trim();
  if(!name){document.getElementById('iname').focus();return;}
  const arr=Object.values(window._guests||{});
  const F=window.FESTA||{capacidade:50};
  if(arr.length>=F.capacidade){toast('Capacidade de '+F.capacidade+' atingida!');return;}
  const id='g'+Date.now();
  const phone=document.getElementById('iphone').value.trim().replace(/\D/g,'');
  saveG(id,{id,name,phone,group:document.getElementById('igroup').value,status:'pendente',addedAt:new Date().toLocaleDateString('pt-BR'),confirmedAt:null,plusOne:0,guestNote:''});
  document.getElementById('iname').value='';document.getElementById('iphone').value='';
  document.getElementById('iname').focus();toast('✓ '+name+' adicionado(a)!');
}

function changeStatus(id,s){
  const e=s==='confirmed'?{confirmedAt:new Date().toLocaleString('pt-BR')}:{confirmedAt:null};
  upG(id,{status:s,...e});
}

function removeGuest(id){
  const g=(window._guests||{})[id];if(!g)return;
  if(!confirm('Remover '+g.name+'?'))return;
  delG(id);toast('Removido.');
}

function openModal(id){
  modalId=id;
  const g=(window._guests||{})[id];if(!g)return;
  document.getElementById('moname').textContent=g.name.split(' ')[0];
  curTab='savedate';
  document.querySelectorAll('.mt').forEach((t,i)=>t.classList.toggle('active',i===0));
  buildMsg(g,'savedate');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function switchTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.mt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const g=(window._guests||{})[modalId];if(g)buildMsg(g,tab);
}

function buildMsg(g,tab){
  const F=window.FESTA||{};
  const fn=g.name.split(' ')[0];
  const link=(F.urlBase||'https://SEU_USUARIO.github.io/feijoada51')+'/confirmar.html?id='+g.id+'&nome='+encodeURIComponent(g.name);
  let msg='';
  if(tab==='savedate'){
    msg=`Oi, ${fn}! 🗓️\n\nReserva essa data: *${F.data}*!\n\nVou completar 51 anos e quero muito contar com você nessa celebração especial. Em breve mando todos os detalhes. 🎂\n\n— ${F.nome}`;
  } else if(tab==='invite'){
    msg=`${fn}, chegou o convite! 🍲🎉\n\nVocê está convidado(a) para a minha *Feijoada de 51 Anos*!\n\n📅 *Data:* ${F.data}\n⏰ *Horário:* ${F.horario}\n📍 *Local:* ${F.local}\n   ${F.endereco}\n\nConfirme sua presença pelo link — leva só 10 segundos:\n👉 ${link}\n\nTe espero com o prato cheio! 😄\n\n— ${F.nome}`;
  } else {
    msg=`Oi, ${fn}! 🔔\n\nSó passando para lembrar: minha *Feijoada de 51 Anos* é em *${F.data}* às *${F.horario}*!\n\n📍 ${F.local}\n\nSe ainda não confirmou, aproveita:\n👉 ${link}\n\nConto com você! 🍲\n\n— ${F.nome}`;
  }
  document.getElementById('momsg').value=msg;
  document.getElementById('molink').textContent=link;
}

function copyMsg(){
  const txt=document.getElementById('momsg').value;
  navigator.clipboard.writeText(txt).then(()=>toast('Copiado!')).catch(()=>{const t=document.getElementById('momsg');t.select();document.execCommand('copy');toast('Copiado!');});
  const g=(window._guests||{})[modalId];if(!g)return;
  if(curTab==='savedate'&&g.status==='pendente')upG(modalId,{status:'savedate'});
  if(curTab==='invite'&&['pendente','savedate'].includes(g.status))upG(modalId,{status:'invited'});
}
function copyLink(){navigator.clipboard.writeText(document.getElementById('molink').textContent).then(()=>toast('Link copiado!'));}
function sendWpp(){
  const g=(window._guests||{})[modalId];if(!g)return;
  const msg=encodeURIComponent(document.getElementById('momsg').value);
  const ph=g.phone?'55'+g.phone:'';
  window.open(ph?`https://wa.me/${ph}?text=${msg}`:`https://wa.me/?text=${msg}`,'_blank');
  if(curTab==='savedate'&&g.status==='pendente')upG(modalId,{status:'savedate'});
  if(curTab==='invite'&&['pendente','savedate'].includes(g.status))upG(modalId,{status:'invited'});
  toast('Abrindo WhatsApp…');
}

function renderAll(){
  const arr=Object.values(window._guests||{});
  const F=window.FESTA||{capacidade:50};
  const conf=arr.filter(g=>g.status==='confirmed').length;
  const pend=arr.filter(g=>['pendente','savedate','invited'].includes(g.status)).length;
  const decl=arr.filter(g=>g.status==='declined').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-val">${arr.length}</div><div class="stat-label">Na lista</div></div>
    <div class="stat sg"><div class="stat-val">${conf}</div><div class="stat-label">Confirmados</div></div>
    <div class="stat sa"><div class="stat-val">${pend}</div><div class="stat-label">Aguardando</div></div>
    <div class="stat sr"><div class="stat-val">${decl}</div><div class="stat-label">Recusaram</div></div>
    <div class="stat sgr"><div class="stat-val">${F.capacidade-conf}</div><div class="stat-label">Vagas livres</div></div>
  `;
  const pct=Math.round((conf/F.capacidade)*100);
  document.getElementById('barfill').style.width=pct+'%';
  document.getElementById('cappct').textContent=conf+' / '+F.capacidade+' confirmados';

  const counts={todos:arr.length};
  ['pendente','savedate','invited','confirmed','declined','waiting'].forEach(s=>{counts[s]=arr.filter(g=>g.status===s).length;});
  const labels={todos:'Todos',pendente:'Pendentes',savedate:'Save the Date',invited:'Convidados',confirmed:'Confirmados',declined:'Recusaram',waiting:'Lista de espera'};
  document.getElementById('filters').innerHTML=['todos','pendente','savedate','invited','confirmed','declined','waiting']
    .map(k=>`<button class="fb ${activeFilter===k?'active':''}" onclick="setFilter('${k}')">${labels[k]} (${counts[k]||0})</button>`).join('');

  const filtered=activeFilter==='todos'?arr:arr.filter(g=>g.status===activeFilter);
  if(!filtered.length){document.getElementById('glist').innerHTML=`<div class="empty">Nenhum convidado aqui.</div>`;return;}
  filtered.sort((a,b)=>(SORD[a.status]??9)-(SORD[b.status]??9)||a.name.localeCompare(b.name,'pt-BR'));
  document.getElementById('glist').innerHTML=filtered.map(g=>{
    const av=pal(g.name);
    const isNew=g.confirmedAt&&isRecent(g.confirmedAt);
    let act=`<button class="bsm msg" onclick="openModal('${g.id}')">💬 Mensagem</button>`;
    if(g.status!=='confirmed')act+=`<button class="bsm ok" onclick="changeStatus('${g.id}','confirmed')">✓</button>`;
    if(g.status!=='declined')act+=`<button class="bsm no" onclick="changeStatus('${g.id}','declined')">✕</button>`;
    return `<div class="gc ${SCARD[g.status]||''}">
      <div class="av" style="background:${av.bg};color:${av.c}">${ini(g.name)}</div>
      <div class="gi">
        <div class="gn">${g.name}${isNew?' <span class="newb">Confirmou agora! 🎉</span>':''}</div>
        <div class="gm">
          <span>${g.group||''}</span>
          ${g.phone?`<span>📱 ${fmt(g.phone)}</span>`:''}
          ${g.confirmedAt?`<span style="color:var(--green)">✓ ${g.confirmedAt}</span>`:''}
          ${g.plusOne>0?`<span class="plusb">+${g.plusOne} acomp.</span>`:''}
          ${g.guestNote?`<span>💬 "${g.guestNote}"</span>`:''}
        </div>
      </div>
      <div class="gr">
        <span class="badge ${SBADGE[g.status]||'bp'}">${SLABEL[g.status]||g.status}</span>
        ${act}
        <button class="bdel" onclick="removeGuest('${g.id}')" title="Remover">✕</button>
      </div>
    </div>`;
  }).join('');
}

function isRecent(d){try{const p=d.split(',')[0].split('/');return Date.now()-new Date(p[2],p[1]-1,p[0]).getTime()<172800000;}catch(e){return false;}}
function setFilter(f){activeFilter=f;renderAll();}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);}

document.getElementById('iname').addEventListener('keydown',e=>{if(e.key==='Enter')addGuest();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
renderAll();
</script>
</body>
</html>
